<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Page Not Found</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='75' font-size='75' fill='%2300d9ff'>RA</text></svg>">
    <style>
        body {
            font-family: 'JetBrains Mono', monospace;
            background: #0a0e27;
            color: #00d9ff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            text-align: center;
        }
        h1 { font-size: 6rem; margin: 0; text-shadow: 0 0 30px rgba(0, 217, 255, 0.5); }
        p { color: #94a3b8; font-size: 1rem; margin: 0.5rem 0; }
        a {
            display: inline-block;
            margin-top: 2rem;
            padding: 0.75rem 2rem;
            color: #00d9ff;
            border: 2px solid #00d9ff;
            border-radius: 8px;
            text-decoration: none;
            transition: all 0.3s;
        }
        a:hover { background: #00d9ff; color: #0a0e27; }
    </style>
</head>
<body>
    <div>
        <h1>404</h1>
        <p>$ cd /home/page</p>
        <p>bash: cd: /home/page: No such file or directory</p>
        <a href="/">← Return Home</a>
    </div>
</body>
</html>
